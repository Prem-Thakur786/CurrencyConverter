<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2563EB"/>

  <!-- Dollar sign left -->
  <text x="10" y="42" font-family="Arial" font-weight="bold" font-size="28" fill="#FFFFFF">$</text>

  <!-- Exchange arrows -->
  <!-- Right arrow (top) -->
  <polyline points="28,20 38,20 38,26" fill="none" stroke="#FACC15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="28" y1="20" x2="38" y2="20" stroke="#FACC15" stroke-width="3" stroke-linecap="round"/>
  <polyline points="36,17 39,20 36,23" fill="none" stroke="#FACC15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left arrow (bottom) -->
  <polyline points="38,38 28,38 28,44" fill="none" stroke="#FACC15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="38" y1="38" x2="28" y2="38" stroke="#FACC15" stroke-width="3" stroke-linecap="round"/>
  <polyline points="30,35 27,38 30,41" fill="none" stroke="#FACC15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Generic currency sign right -->
  <text x="40" y="50" font-family="Arial" font-weight="bold" font-size="20" fill="#FFFFFF">₨</text>
</svg>
